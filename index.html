  <!-- Story Library — reusable SVG defs (corners, crest, pendant, padlock,
       shelf props, gold gradients). Referenced via <use href="#…"/>. -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#f8e29a"/>
        <stop offset="35%"  stop-color="#d8b04a"/>
        <stop offset="55%"  stop-color="#a67a1d"/>
        <stop offset="80%"  stop-color="#e0bc5a"/>
        <stop offset="100%" stop-color="#8a5e10"/>
      </linearGradient>
      <linearGradient id="gold-h" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"   stop-color="#8a5e10"/>
        <stop offset="30%"  stop-color="#e8c668"/>
        <stop offset="50%"  stop-color="#f8e29a"/>
        <stop offset="70%"  stop-color="#d8b04a"/>
        <stop offset="100%" stop-color="#8a5e10"/>
      </linearGradient>

        <g fill="url(#gold)">

          <circle cx="60" cy="30" r="1.6"/><circle cx="30" cy="60" r="1.6"/>
          <path d="M64 50 Q72 56 72 68 Q66 70 60 64 Q58 56 64 50 Z" opacity=".7"/>
          <path d="M50 64 Q56 72 68 72 Q70 66 64 60 Q56 58 50 64 Z" opacity=".7"/>
          <circle cx="68" cy="68" r="1.4"/>
        </g>
      </symbol>

      <symbol id="crest" viewBox="0 0 120 70">
        <g fill="url(#gold)">
          <path d="M60 4 Q56 14 50 18 Q44 22 38 18 Q40 28 50 30 Q60 32 70 30 Q80 28 82 18 Q76 22 70 18 Q64 14 60 4 Z"/>
          <circle cx="60" cy="8" r="2.4"/>

          <path d="M40 46 Q60 50 80 46 L78 52 Q60 56 42 52 Z"/>

      </symbol>

          <circle cx="30" cy="44" r="1.6"/>
          <path d="M30 56 Q22 60 22 70 Q30 74 38 70 Q38 60 30 56 Z" opacity=".85"/>
        </g>
      </symbol>

      <symbol id="vine" viewBox="0 0 100 14">
        <g fill="url(#gold-h)">

      </symbol>

      <!-- Padlock motif for locked book covers -->
      <symbol id="padlock" viewBox="0 0 60 70">
        <g fill="url(#gold)">

          <rect x="29" y="44" width="2" height="10" fill="#5a3c08"/>
        </g>

        <ellipse cx="25" cy="92" rx="20" ry="4" fill="#3a1d08"/>
        <rect x="14" y="60" width="22" height="32" rx="1" fill="#c89a4a"/>

        <path d="M14 44 Q4 38 4 30 Q14 26 22 38" fill="#5a8abc"/>

        <rect x="36" y="100" width="8" height="14" fill="#3a2a08"/>
        <ellipse cx="40" cy="114" rx="20" ry="3" fill="#3a2a08"/>

        <ellipse cx="40" cy="60" rx="26" ry="4" fill="url(#gold)"/>
        <rect x="38" y="44" width="4" height="16" fill="url(#gold)"/>
        <circle cx="40" cy="42" r="6" fill="#fff5d0"/>
        <circle cx="40" cy="42" r="14" fill="#ffd97a" opacity=".25">
          <animate attributeName="opacity" values=".22;.32;.22" dur="3s" repeatCount="indefinite"/>
        </circle>

        <ellipse cx="100" cy="140" rx="92" ry="130" fill="none" stroke="url(#gold)" stroke-width="2.4"/>
        <ellipse cx="100" cy="140" rx="86" ry="124" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity=".5"/>
      </symbol>

      <symbol id="circle-frame" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="90" fill="none" stroke="url(#gold)" stroke-width="2.6"/>
        <circle cx="100" cy="100" r="84" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity=".5"/>
