<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Large flat antlers (left) -->
  <path d="M68 52 C48 44 30 30 28 16 C32 8 42 12 44 24 C48 12 56 8 60 18 C58 28 52 36 56 44" fill="#8b5e3c" stroke="#7a4e2c" stroke-width="2"/>
