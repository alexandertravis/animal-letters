  <ellipse cx="100" cy="100" rx="48" ry="52" fill="#8b5e3c"/>
  <!-- Long bulbous snout -->
  <ellipse cx="100" cy="132" rx="32" ry="26" fill="#7a4e2c"/>
  <!-- Bell (dewlap) -->
  <path d="M92 148 C88 160 86 172 90 178" stroke="#8b5e3c" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="76" cy="90" r="9" fill="#fff"/>
  <circle cx="124" cy="90" r="9" fill="#fff"/>
  <circle cx="77" cy="90" r="6" fill="#222"/>
  <circle cx="125" cy="90" r="6" fill="#222"/>
  <circle cx="78" cy="88" r="2" fill="#fff"/>
  <circle cx="126" cy="88" r="2" fill="#fff"/>
  <!-- Nostrils (large) -->
  <ellipse cx="90" cy="140" rx="7" ry="5" fill="#5a3820"/>
  <ellipse cx="110" cy="140" rx="7" ry="5" fill="#5a3820"/>
  <!-- Ears -->
  <ellipse cx="62" cy="64" rx="10" ry="16" fill="#8b5e3c" transform="rotate(-20 62 64)"/>
  <ellipse cx="138" cy="64" rx="10" ry="16" fill="#8b5e3c" transform="rotate(20 138 64)"/>
