  <path d="M36 14 L28 6 M44 10 L40 2 M52 8 L50 0" stroke="#8b5e3c" stroke-width="4" stroke-linecap="round"/>
  <!-- Large flat antlers (right) -->
  <path d="M132 52 C152 44 170 30 172 16 C168 8 158 12 156 24 C152 12 144 8 140 18 C142 28 148 36 144 44" fill="#8b5e3c" stroke="#7a4e2c" stroke-width="2"/>
  <!-- Antler tines (right) -->
  <path d="M164 14 L172 6 M156 10 L160 2 M148 8 L150 0" stroke="#8b5e3c" stroke-width="4" stroke-linecap="round"/>
