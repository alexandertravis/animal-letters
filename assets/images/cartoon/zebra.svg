<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Mane (upright black mohawk) -->
  <ellipse cx="94" cy="44" rx="11" ry="30" fill="#222"/>
  <!-- Ear left -->
  <polygon points="64,72 52,40 80,65" fill="#f0f0f0"/>
  <polygon points="66,70 58,48 78,65" fill="#e8b0b0"/>
  <!-- Ear right -->
  <polygon points="118,70 130,40 106,65" fill="#f0f0f0"/>
  <polygon points="116,68 124,48 108,65" fill="#e8b0b0"/>
  <!-- Head -->
  <ellipse cx="94" cy="92" rx="48" ry="50" fill="#f2f2f2"/>
  <!-- Bold stripes — left side -->
  <path d="M54,72 Q74,64 90,76" stroke="#222" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M50,92 Q70,84 86,96" stroke="#222" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M52,112 Q72,106 88,118" stroke="#222" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Bold stripes — right side -->
  <path d="M106,72 Q124,65 140,74" stroke="#222" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M108,92 Q126,86 142,95" stroke="#222" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Muzzle -->
  <ellipse cx="90" cy="158" rx="34" ry="28" fill="#e8e8e8"/>
  <ellipse cx="90" cy="160" rx="25" ry="20" fill="#f5f5f5"/>
  <!-- Stripe on muzzle -->
  <path d="M64,140 Q82,133 102,142" stroke="#222" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="70" cy="90" r="13" fill="#fff"/>
  <circle cx="116" cy="90" r="13" fill="#fff"/>
  <circle cx="72" cy="90" r="8" fill="#2c1800"/>
  <circle cx="118" cy="90" r="8" fill="#2c1800"/>
  <circle cx="73" cy="88" r="3" fill="#fff"/>
  <circle cx="119" cy="88" r="3" fill="#fff"/>
  <!-- Nostrils -->
  <ellipse cx="78" cy="160" rx="5" ry="4.5" fill="#8a7070" transform="rotate(-15 78 160)"/>
  <ellipse cx="104" cy="162" rx="5" ry="4.5" fill="#8a7070" transform="rotate(8 104 162)"/>
  <!-- Mouth line -->
  <path d="M68,172 Q88,180 112,172" stroke="#8a7070" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
