  <ellipse cx="100" cy="48" rx="26" ry="22" fill="#f5c842"/>
  <!-- Ossicones (horns) -->
  <rect x="84" y="26" width="7" height="18" rx="3" fill="#c8821a"/>
  <circle cx="87" cy="25" r="4" fill="#8b5e1a"/>
  <rect x="109" y="26" width="7" height="18" rx="3" fill="#c8821a"/>
