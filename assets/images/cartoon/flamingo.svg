<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="38" ry="30" fill="#f07090"/>
  <!-- Wing -->
  <ellipse cx="100" cy="122" rx="44" ry="22" fill="#e05878" transform="rotate(-5 100 122)"/>
  <!-- Long neck (curved) -->
  <path d="M100 102 C96 85 92 68 104 52 C110 44 118 38 120 30" stroke="#f07090" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="122" cy="26" r="18" fill="#f07090"/>
  <!-- Beak (bent) -->
  <path d="M132 28 L148 22 L148 28 L132 34 Z" fill="#f5a623"/>
  <path d="M148 22 L152 18 L152 22 L148 28 Z" fill="#222"/>
  <!-- Eye -->
  <circle cx="118" cy="20" r="5" fill="#fff"/>
  <circle cx="119" cy="20" r="3" fill="#222"/>
  <circle cx="119" cy="19" r="1" fill="#fff"/>
  <!-- Long leg -->
  <line x1="94" y1="158" x2="90" y2="195" stroke="#f07090" stroke-width="5" stroke-linecap="round"/>
  <!-- Foot -->
  <path d="M82 194 L90 195 L98 194" stroke="#f07090" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Folded second leg -->
  <path d="M106 155 C110 170 108 180 106 185" stroke="#f07090" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
