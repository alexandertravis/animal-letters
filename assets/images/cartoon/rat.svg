  <circle cx="67" cy="56" r="18" fill="#bdbdbd"/>
  <circle cx="67" cy="56" r="11" fill="#e8a8b0"/>
  <circle cx="133" cy="56" r="18" fill="#bdbdbd"/>
  <circle cx="133" cy="56" r="11" fill="#e8a8b0"/>
