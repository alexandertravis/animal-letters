<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Body -->
  <ellipse cx="100" cy="140" rx="62" ry="42" fill="#d4a96a"/>
  <!-- Hump -->
  <ellipse cx="100" cy="96" rx="32" ry="26" fill="#c8914a"/>
  <!-- Neck -->
  <path d="M66 118 C58 100 60 80 70 62" stroke="#d4a96a" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <ellipse cx="70" cy="52" rx="26" ry="22" fill="#d4a96a"/>
  <!-- Snout (long) -->
  <ellipse cx="60" cy="62" rx="16" ry="10" fill="#c8914a"/>
  <!-- Eye -->
  <circle cx="78" cy="46" r="7" fill="#fff"/>
  <circle cx="79" cy="46" r="4" fill="#222"/>
  <circle cx="79" cy="45" r="1.5" fill="#fff"/>
  <!-- Eyelash (camels have long lashes) -->
  <path d="M74 40 L72 34 M78 39 L77 33 M82 40 L83 34" stroke="#8b5e3c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Nostril -->
  <ellipse cx="50" cy="64" rx="4" ry="3" fill="#8b5e3c"/>
  <!-- Ear -->
  <ellipse cx="82" cy="36" rx="6" ry="10" fill="#c8914a"/>
  <!-- Legs (stubs) -->
  <rect x="66" y="174" width="14" height="20" rx="5" fill="#c8914a"/>
  <rect x="88" y="176" width="14" height="18" rx="5" fill="#c8914a"/>
  <rect x="108" y="174" width="14" height="20" rx="5" fill="#c8914a"/>
  <rect x="128" y="176" width="14" height="18" rx="5" fill="#c8914a"/>
  <!-- Tail -->
  <path d="M160 150 C168 158 166 168 162 172" stroke="#c8914a" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
