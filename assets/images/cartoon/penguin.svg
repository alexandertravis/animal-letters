  <circle cx="114" cy="62" r="9" fill="#fff"/>
  <circle cx="88" cy="62" r="6" fill="#222"/>
  <circle cx="116" cy="62" r="6" fill="#222"/>
  <circle cx="89" cy="60" r="2" fill="#fff"/>
